<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلباتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo',sans-serif;margin:0;background:#f4f4f4;direction:rtl}
h2{text-align:center;color:#d32f2f}
.container{max-width:600px;margin:40px auto;background:#fff;padding:20px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ccc;border-radius:6px}
button{padding:10px;background:#d32f2f;color:#fff;border:none;border-radius:6px;width:100%;margin-top:10px}
button:hover{background:#b71c1c}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:15px}
.item{background:#fafafa;padding:10px;border-radius:8px;text-align:center}
.cart{background:#fff3e0;padding:15px;border-radius:10px;margin-top:20px}
.hidden{display:none}
</style>
</head>
<body>

<div class="container" id="loginPage">
<h2>تسجيل دخول</h2>
<input id="name" placeholder="الاسم">
<input id="location" placeholder="الموقع">
<input id="phone" placeholder="رقم الهاتف">
<button onclick="login()">دخول</button>
</div>

<div class="container hidden" id="mainPage">
<h2>اختر المنتجات</h2>

<select id="category" onchange="showProducts()">
<option value="">اختر القسم</option>
<option value="veg">خضروات</option>
<option value="fruit">فواكه</option>
<option value="legumes">بقوليات</option>
<option value="restaurants">مطاعم</option>
<option value="other">مشتريات أخرى</option>
</select>

<div id="products" class="grid"></div>

<div class="cart">
<h3>🛒 سلة الطلب</h3>
<div id="cartItems"></div>
<button onclick="sendOrder()">إرسال الطلب إلى واتساب</button>
</div>

<div class="cart">
<h3>🔥 عروض المطاعم اليوم</h3>
<p>بيتزا عائلية 50 ألف</p>
<p>برغر + بطاطا 25 ألف</p>
<p>فروج مشوي 60 ألف</p>
</div>

</div>

<script>
let user={},cart=[];

const data={
veg:["بطاطا","بندورة","خيار","بصل","ثوم","كوسا","باذنجان","فليفلة","ملفوف","سبانخ","جزر","فاصولياء"],
fruit:["تفاح","موز","برتقال","فراولة","مانغا","كيوي","عنب","دراق","إجاص","أناناس","رمان","ليمون"],
legumes:["عدس","حمص","فول","فاصولياء يابسة","برغل","رز"],
restaurants:["بيتزا","برغر","شاورما","فروج مشوي","مناقيش"],
other:["منظفات","مياه","عصائر","شيبس","بسكويت"]
};

function login(){
const n=name.value,l=location.value,p=phone.value;
if(!n||!l||!p){alert("يرجى ملء جميع الحقول");return;}
user={n,l,p};
localStorage.setItem("user",JSON.stringify(user));
loginPage.classList.add("hidden");
mainPage.classList.remove("hidden");
}

function showProducts(){
const cat=category.value;
products.innerHTML="";
if(!data[cat])return;
data[cat].forEach(item=>{
products.innerHTML+=`
<div class="item">
${item}
<input type="number" min="1" placeholder="الكمية" id="${item}">
<button onclick="addToCart('${item}')">إضافة</button>
</div>`;
});
}

function addToCart(item){
let qty=document.getElementById(item).value;
if(!qty||qty<=0)return;
cart.push({item,qty});
renderCart();
}

function renderCart(){
cartItems.innerHTML="";
cart.forEach(c=>{
cartItems.innerHTML+=`<p>${c.item} × ${c.qty}</p>`;
});
}

function sendOrder(){
if(cart.length==0){alert("السلة فارغة");return;}
let message="طلب جديد من موقع طلباتي\n";
message+=`الاسم: ${user.n}\nالموقع: ${user.l}\nالرقم: ${user.p}\n\n`;
cart.forEach(c=>{
message+=`${c.item} × ${c.qty}\n`;
});
window.open("https://wa.me/963949170662?text="+encodeURIComponent(message),'_blank');
}

window.onload=function(){
let saved=localStorage.getItem("user");
if(saved){
user=JSON.parse(saved);
loginPage.classList.add("hidden");
mainPage.classList.remove("hidden");
}
}
</script>

</body>
</html>
